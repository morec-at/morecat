name: ci

# main への push は path filter し、PR は required check を必ず生成するため全件実行する。
# ツールチェーンはローカルと同じ nix dev shell を使う（CI == local の再現性）。
# Action はサプライチェーン保護のためコミット SHA で固定（末尾コメントはバージョン目安）。

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/ui/**'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/ci.yml'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: api (Scala) format, compile & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@fd3eb131b9b46cc1dd978a7c0ba3fce79dd7d3eb # v3.9.1

      - name: Cache sbt / coursier
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
            ~/.cache/firebase/emulators
          key: ${{ runner.os }}-sbt-${{ hashFiles('apps/api/build.sbt', 'apps/api/project/build.properties', 'apps/api/project/plugins.sbt', 'apps/api/.scalafmt.conf', 'apps/api/firebase.json', 'flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Format check & clean (apps/api)
        run: |
          nix develop .#scala --command bash -c 'cd apps/api && sbt -batch -no-colors scalafmtCheckAll clean'

      - name: Unit, Firestore/Postgres integration & coverage (apps/api)
        run: |
          nix develop .#scala --command bash -c 'cd apps/api && firebase emulators:exec --only firestore --project demo-morecat "sbt -batch -no-colors coverage domain/test application/test infrastructure/test bootstrap/test \"infrastructure / FirestoreIntegration / test\" \"infrastructure / PostgresIntegration / test\" coverageAggregate"'

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: api-scoverage-report
          path: apps/api/target/scala-*/scoverage-report/**
          if-no-files-found: error
          retention-days: 14

  ui:
    name: ui (pnpm generate, test & typecheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@fd3eb131b9b46cc1dd978a7c0ba3fce79dd7d3eb # v3.9.1

      - name: Install dependencies (apps/ui)
        run: |
          nix develop .#node --command bash -c 'cd apps/ui && pnpm install --frozen-lockfile'

      - name: Generate check, test & typecheck (apps/ui)
        run: |
          nix develop .#node --command bash -c 'cd apps/ui && pnpm --filter @morecat/api-client generate && git diff --exit-code openapi.yaml packages/api-client/src/schema.ts && pnpm test && pnpm typecheck'
